services:
  # TiKV の Placement Driver（クラスタ調整・メタデータ・TSO）。tikv1〜3 と surreal が pd:2379 に接続する。
  pd:
    image: pingcap/pd:v8.5.5
    command:
      - --name=pd
      - --data-dir=/var/lib/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
    restart: unless-stopped

  tikv1:
    image: pingcap/tikv:v8.5.5
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv1:20160
      - --data-dir=/var/lib/tikv
      - --status-addr=0.0.0.0:20180
    restart: unless-stopped
    depends_on:
      - pd

  tikv2:
    image: pingcap/tikv:v8.5.5
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv2:20160
      - --data-dir=/var/lib/tikv
      - --status-addr=0.0.0.0:20180
    restart: unless-stopped
    depends_on:
      - pd

  tikv3:
    image: pingcap/tikv:v8.5.5
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv3:20160
      - --data-dir=/var/lib/tikv
      - --status-addr=0.0.0.0:20180
    restart: unless-stopped
    depends_on:
      - pd

  surreal:
    image: surrealdb/surrealdb:v3.0.2
    command:
      - start
      - --log
      - TRACE
      - --bind
      - 0.0.0.0:8000
      - --user
      - "user"
      - --pass
      - "pass"
      - tikv://pd:2379
    restart: unless-stopped
    depends_on:
      - pd
      - tikv1
      - tikv2
      - tikv3

  # basolato バックエンド開発用コンテナ。Flux Cloud 上で動かすメインバックエンドのローカル開発環境。
  # ICP キャニスター開発用コンテナ。Internet Identity 認証基盤の開発に使う。
  app:
    build:
      context: .
      dockerfile: ./docker/app/develop.Dockerfile
    tty: true
    volumes:
      - .:/application
    ports:
      - 4943:4943 # icp internet identity
      - 3000:3000 # preact frontend
      - 8000:8000 # basolato backend
    depends_on:
      - surreal
    environment:
      - SURREALDB_URL=http://surreal:8000
      - SURREALDB_USER="user"
      - SURREALDB_PASS="pass"
      - ICP_NETWORK="local"
